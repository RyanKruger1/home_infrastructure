apiVersion: v1
kind: Service
metadata:
  name: {{ include "mariadb.fullname" . }}
  labels:
    {{- include "mariadb.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: mysql
      port: {{ .Values.service.port }}
      targetPort: mysql
  selector:
    app.kubernetes.io/name: {{ include "mariadb.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
